anecdotes:
  - title: It was the best of times, etc.
    url: https://www.robinsloan.com/lab/worst-or-best/
    quote: "This is useful: a sort of counter-mantra. The enthusiasts really do invoke “this is the worst AI will ever be” almost like a magic spell. Along the narrow technical dimension, the claim is certainly true … but the technical dimension is not the only one, nor even the most important. There are commercial and ecological dimensions, too, and we can look at every other digital system — literally every other digital system! — for clues about trajectories from worst to best, best to worst."

  - title: How I don’t use LLMs
    url: https://www.gleech.org/llms
    quote: I have a powerful urge to John Henry my way through this age. Let the heavens fall, but find me at my desk. But I doubt I am that strong, and they will improve.
